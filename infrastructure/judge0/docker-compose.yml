x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: judge0/judge0:1.13.1
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "${JUDGE0_HOST_PORT:-2358}:2358"
    depends_on:
      - db
      - redis
    <<: *default-logging
    restart: unless-stopped

  worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - db
      - redis
    <<: *default-logging
    restart: unless-stopped

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0-db:/var/lib/postgresql/data/
    <<: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7.2.4
    command:
      [
        "bash",
        "-c",
        "docker-entrypoint.sh --appendonly no --requirepass \"$$REDIS_PASSWORD\"",
      ]
    env_file: judge0.conf
    volumes:
      - judge0-redis:/data
    <<: *default-logging
    restart: unless-stopped

volumes:
  judge0-db:
  judge0-redis:
